<html>
  <head>
    <title>ibira</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="{{ static_url + 'output.css' }}" />
  </head>
  <body>
    <div class="container mx-auto p-4">
      <nav class="mb-8">
        <div class="flex justify-between items-center">
          <h1 class="text-3xl font-bold">ibira</h1>
          <div class="flex space-x-6">
        <a href="/sobre" class="text-gray-700 hover:text-blue-500 transition-colors">sobre</a>
        <a href="/projetos" class="text-gray-700 hover:text-blue-500 transition-colors">projetos</a>
        <a href="/now" class="text-gray-700 hover:text-blue-500 transition-colors">now</a>
          </div>
        </div>
      </nav>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        {% for item in items %}
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
          <img src="{{ static_url + 'assets/' + item.image_url }}" alt="{{ item.title }}" class="w-full h-48 object-cover" />
          <div class="p-4">
            <h2 class="text-xl font-semibold mb-2">{{ item.title }}</h2>
            <p class="text-gray-600 mb-4">{{ item.description }}</p>
            <a href="{{ item.link }}" class="text-blue-500 hover:underline">Read more</a>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
