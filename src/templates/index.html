<html>
  <head>
    <title>ibira</title>
    <meta charset="UTF-8" />
    <meta property="og:title" content="ibira" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="{{ static_url + 'assets/og-image.png' }}" />
    <meta property="og:url" content="{{ url }}" />
    <meta property="og:description" content="A collection of my projects and writings." />
    <meta property="og:site_name" content="ibira" />
    <meta property="og:locale" content="pt_BR" />
    {# <meta property="og:locale_alternate" content="en_US" /> #}
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="{{ static_url + 'output.css' }}" />
  </head>
  <body class="bg-seasalt">
    <div class="container mx-auto p-4">
      <nav class="mb-8 flex justify-center">
        <div class="flex w-8/12 justify-between items-center">
          <div class="flex items-center space-x-4">
            <h1 id="site-title" class="text-6xl font-bold">ibira</h1>
            <span aria-hidden="true" class="invisible text-6xl font-bold">ibira</span>
          </div>
          <div class="flex space-x-6">
            <a href="/sobre" class="text-dark-moss-green-300 hover:text-dark-moss-green-500 transition-colors">sobre</a>
            <a href="/projetos" class="text-gray-700 hover:text-blue-500 transition-colors">projetos</a>
            <a href="/now" class="text-gray-700 hover:text-blue-500 transition-colors">now</a>
          </div>
        </div>
      </nav>

      <div class="flex gap-4 mb-8">
        {% with test_div='<div class="h-96 border-2 border-dashed border-red-500 bg-red-50 flex items-center justify-center"><span class="text-red-600 font-semibold">Test Area</span></div>' %}
        <div class="flex flex-col gap-4 w-8/12">
          <div>
            {{ test_div|safe }}
          </div>
          <div class="grid gap-4 grid-cols-3">
            {% for i in range(6) %}
              {{ test_div|safe }}
            {% endfor %}
          </div>
        </div>
        <div class="flex flex-col gap-4 w-4/12">
          {% for item in items %}
              {{ test_div|safe }}
          {% endfor %}
        </div>
        {% endwith %}
      </div>
    </div>
  </body>
</html>
