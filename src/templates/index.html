{% extends "base.html" %}

{% block content %}
<div class="flex flex-col gap-4 mb-8 w-10/12 mx-auto">
  {% for item in items %}
  <a href="{{ item.link }}" class="w-full">
    <div class="bg-white shadow-md overflow-hidden relative group" style="height: 30vh;">
      <div class="absolute inset-0 bg-gray-200 opacity-0 group-hover:opacity-20 transition-opacity duration-300 z-10"></div>
      <div class="flex h-full">
        <img class="w-2/5 object-cover" src="{{ cdn_url + item.banner.path }}" alt="{{ item.title }}" />
        <div class="w-3/5 p-6 flex flex-col justify-center">
          <h2 class="text-2xl font-semibold mb-2">{{ item.title }}</h2>
          <p class="text-gray-600">{{ item.description }}</p>
        </div>
      </div>
    </div>
  </a>
  {% endfor %}
</div>
{% endblock %}
